aid: notebooklm
name: Google NotebookLM
description: >-
  Google NotebookLM is an AI-powered research and thinking partner that
  helps users analyze, summarize, and explore sources such as documents,
  PDFs, web pages, and notes. It leverages Google's Gemini models to ground
  responses in user-provided source material, generating summaries, study
  guides, FAQs, and Audio Overviews. NotebookLM does not currently expose
  a public API; integration with the service is limited to the web interface
  and supported Google Workspace contexts.
